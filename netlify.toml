[build]
  command = "pnpm --filter @workspace/vertex-labs run build:netlify"
  publish = "artifacts/vertex-labs/dist"

[build.environment]
  PORT = "3000"
  BASE_PATH = "/"
  NODE_ENV = "production"

[functions]
  directory = "artifacts/vertex-labs/netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
